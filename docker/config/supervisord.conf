[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:chrome-debug-1]
command=/usr/bin/chromium
    --headless=new
    --no-sandbox
    --disable-gpu
    --disable-dev-shm-usage
    --disable-background-networking
    --disable-component-update
    --disable-blink-features=AutomationControlled
    --disable-infobars
    --remote-debugging-port=9222
    --remote-debugging-address=0.0.0.0
    --user-data-dir=/tmp/chrome-profile-1
autostart=true
autorestart=true
stdout_logfile=/var/log/chrome-debug-1.log
stderr_logfile=/var/log/chrome-debug-1-err.log
priority=10

[program:chrome-debug-2]
command=/usr/bin/chromium
    --headless=new
    --no-sandbox
    --disable-gpu
    --disable-dev-shm-usage
    --disable-background-networking
    --disable-component-update
    --disable-blink-features=AutomationControlled
    --disable-infobars
    --remote-debugging-port=9223
    --remote-debugging-address=0.0.0.0
    --user-data-dir=/tmp/chrome-profile-2
autostart=true
autorestart=true
stdout_logfile=/var/log/chrome-debug-2.log
stderr_logfile=/var/log/chrome-debug-2-err.log
priority=10
