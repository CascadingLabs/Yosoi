services:
  yosoi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      CHROME_WS_URLS: "http://localhost:9222,http://localhost:9223"
      BROWSER_COUNT: "2"
      TABS_PER_BROWSER: "4"
      TAB_MAX_USES: "50"
      TAB_MAX_IDLE_SECS: "60"
      CHROME_NO_SANDBOX: "1"
    ports:
      - "9222:9222"
      - "9223:9223"
    shm_size: "2gb"
    healthcheck:
      test: >
        curl -sf http://localhost:9222/json/version &&
        curl -sf http://localhost:9223/json/version
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
