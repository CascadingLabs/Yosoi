# Dependency CVE gate — be proactive instead of waiting on Dependabot.
#
# Inlined (not a reusable-workflow `uses:`) on purpose: Yosoi is a PUBLIC repo,
# and a public repo cannot call a reusable workflow stored in the org's PRIVATE
# CascadingLabs/.github repo — nor could external forks. Keeping the job here
# means the gate runs identically on the main repo and on fork PRs. If this
# scanner drifts from the org-shared cve-python.yml, reconcile it by hand.
#
# Python-only: Yosoi has no JS/TS runtime deps (browser automation goes through
# VoidCrawl, not Node/puppeteer — see AGENTS.md), so there is no lockfile to audit.

name: Security (CVE)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: CVE — Python (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Sync locked dependencies
        run: uv sync --all-extras --frozen

      - name: pip-audit (fails on any known CVE)
        # Audit the locked uv.lock/pyproject environment in place — no throwaway
        # requirements.txt. `--with pip-audit` layers the auditor onto the synced
        # project venv so it sees the real resolved set; `--skip-editable` drops
        # the local `yosoi` dist (not on PyPI, nothing to audit).
        run: uv run --with pip-audit pip-audit --skip-editable --progress-spinner off
