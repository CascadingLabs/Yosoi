name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  licenses:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check dependency licenses
        run: uv run poe licenses

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "stable"
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create Virtual Environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group tests --group dev

      - name: Run Prek checks (ruff, mypy, etc)
        # if: matrix.python-version == '3.10'
        run: uv run poe ci-check

      - name: Run CI Tests
        run: uv run poe ci-test

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  void-crawl:
    name: void_crawl (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: void_crawl
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            void_crawl/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('void_crawl/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check (compile)
        run: cargo check --workspace

      - name: Run tests (serial — Chrome singleton lock)
        run: cargo test -p void_crawl_core -- --test-threads=1
