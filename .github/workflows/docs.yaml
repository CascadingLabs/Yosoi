name: Generate & Publish API Docs

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      exclude:
        description: 'Comma-separated symbol names to exclude from API reference'
        required: false
        default: ''

jobs:
  generate-docs:
    name: Generate API reference and push to YosoiDocs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Yosoi
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-$(uv run python -c 'import yosoi; print(yosoi.__version__)')}" >> "$GITHUB_OUTPUT"

      - name: Generate API reference
        run: |
          uv run --with "griffe>=2" python scripts/generate_api_docs.py \
            --output-dir reference \
            --version "${{ steps.version.outputs.tag }}" \
            --ref "${{ steps.version.outputs.tag }}" \
            --exclude "${{ github.event.inputs.exclude || '' }}"

      - name: Upload generated docs as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-reference
          path: reference/

      - name: Clone YosoiDocs and push
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${DOCS_DEPLOY_TOKEN}@github.com/CascadingLabs/YosoiDocs.git" yosoi-docs-repo
          mkdir -p yosoi-docs-repo/reference
          cp reference/*.md yosoi-docs-repo/reference/
          rm -f yosoi-docs-repo/api-reference.md

          cd yosoi-docs-repo
          git add -A api-reference.md reference/

          if git diff --cached --quiet; then
            echo "No changes to API reference — skipping commit"
          else
            git commit -m "docs: update API reference for ${TAG}"
            git push origin main
            echo "Pushed API reference to YosoiDocs"
          fi

          # Always tag so CascadingLabsFE can identify doc versions.
          git tag -f "${TAG}"
          git push origin "${TAG}"
          echo "Tagged YosoiDocs with ${TAG}"

      - name: Trigger submodule update in CascadingLabsFE
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DOCS_DEPLOY_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CascadingLabs/CascadingLabsFE/dispatches \
            -d "{\"event_type\": \"update-yosoi-docs\", \"client_payload\": {\"tag\": \"${TAG}\"}}"
