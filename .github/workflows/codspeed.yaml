name: CodSpeed

# CPU/walltime benchmarks for the non-LLM hot path (cleaning, extraction,
# contract validation, full cache replay). CodSpeed tracks these per-commit and
# comments regressions on PRs. NOTE: this covers IN-PROCESS CPU only — voidcrawl
# Chrome memory is tracked separately in memory-bench.yaml.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  benchmarks:
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create Virtual Environment
        run: uv venv --python 3.13

      - name: Install dependencies
        run: uv sync --python 3.13 --group tests

      - name: Run benchmarks
        # TODO: pin to a commit SHA (repo convention) once selected.
        uses: CodSpeedHQ/action@v3
        with:
          run: uv run --group tests pytest tests/benchmarks --codspeed
          token: ${{ secrets.CODSPEED_TOKEN }}
