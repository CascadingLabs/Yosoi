# Cascading Labs — Python Lint CI (runs parallel to main CI)
# Covers: ruff check, ruff format, mypy, pyproject-fmt

name: Lint (Python)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check (no auto-fix)
        run: uv run ruff check --no-fix --exit-non-zero-on-fix --extend-select RUF100 .

      - name: Ruff format check
        run: uv run ruff format --check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: mypy (strict)
        run: uv run mypy yosoi

  selector-policy:
    name: Selector policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ban hard-coded selectors in examples
        # Same tested checker the pre-commit hook runs; this is its CI backstop.
        run: uv run python scripts/check_no_hardcoded_selectors.py examples

  pyproject-fmt:
    name: pyproject.toml format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Check pyproject.toml formatting
        # Pin pyproject-fmt AND its toml-fmt-common dep to the exact pair the local
        # pre-commit hook (.pre-commit-config.yaml, rev v2.21.1) resolves. An unpinned
        # `uvx pyproject-fmt` — and even a version-only pin — pulled a too-new
        # toml-fmt-common that renamed `_build_cli` -> `build_cli`, crashing on import.
        run: uvx --with 'toml-fmt-common==1.3.2' pyproject-fmt==2.21.1 --check pyproject.toml
